[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  ASTRO_SITE = "https://lebarche66.netlify.app"
  ASTRO_BASE = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn-cookieyes.com https://www.googletagmanager.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://*.cloudinary.com https://a0.muscache.com https://d33wubrfki0l68.cloudfront.net https://cdn-cookieyes.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://cdn-cookieyes.com; frame-ancestors 'none'"

[[headers]]
  for = "/photos/*.avif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "image/avif"

[[headers]]
  for = "/photos/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
